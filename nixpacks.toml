# nixpacks.toml — Railway build/start configuration for Reserva backend
#
# Problem: Nixpacks auto-detects a start command that bypasses the Procfile
# web: line, so collectstatic never runs and WhiteNoise has no files to
# serve — every /static/admin/* asset returns 404.
#
# Fix: run collectstatic at BUILD TIME (assets baked into the image) and pin
# the start command so Railway cannot override it.
#
# The dummy SECRET_KEY is safe for build-only use — collectstatic does not
# use it for any cryptographic purpose; it just needs the setting to be present.

[phases.build]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd backend && SECRET_KEY=build-only-dummy-key DJANGO_SETTINGS_MODULE=config.settings.production python manage.py collectstatic --noinput",
]

[start]
cmd = "cd backend && DJANGO_SETTINGS_MODULE=config.settings.production python manage.py collectstatic --noinput && DJANGO_SETTINGS_MODULE=config.settings.production gunicorn config.wsgi --workers 2 --bind 0.0.0.0:$PORT --timeout 60"
